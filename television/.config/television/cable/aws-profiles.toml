[metadata]
name = "aws-profiles"
description = "List and switch AWS CLI profiles"
requirements = ["aws", "grep"]

[source]
command = "grep -E '^\\[profile (cnops|cargonet|trafficinfo)' ~/.aws/config 2>/dev/null | sed 's/\\[profile //' | sed 's/\\]//' || grep '\\[' ~/.aws/credentials 2>/dev/null | sed 's/\\[//' | sed 's/\\]//'"

[keybindings]
ctrl-e = "actions:export"

[actions.export]
description = "Export the selected profile (sets AWS_PROFILE)"
command = "export AWS_PROFILE='{}' && echo \"AWS_PROFILE set to '{}'\" && $SHELL"
mode = "execute"
